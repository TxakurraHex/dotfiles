# ~/.tmux.conf
# Persistent sessions that survive SSH drops, truecolor, vi copy mode, and
# pane-synchronization for fleet work. Reload with: prefix r

# ── Prefix ───────────────────────────────────────────────────────────────────
# C-a is easier to reach than C-b. Comment these two lines to keep the default.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Truecolor (so Starship/TUIs render correctly inside tmux under Ghostty) ──
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",*:RGB"

# ── General ──────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 100000
set -g base-index 1                 # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10              # snappier ESC for vim/nvim
set -g focus-events on
set -g set-clipboard on

# ── Splits (intuitive | and -, open in current path) ─────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim keys) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Resize (repeatable: hold prefix, tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Fleet ops: broadcast keystrokes to ALL panes (toggle) ────────────────────
# Type one command, run it on every device pane at once. Status bar warns ON.
bind e setw synchronize-panes \; display "sync-panes: #{?pane_synchronized,ON,OFF}"

# ── Copy mode (vi, copies to macOS clipboard) ────────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ── Reload ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ── Status bar (shows session + host; right side highlights sync mode) ───────
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left-length 30
set -g status-left "#[bold]❐ #S #[default]"
set -g status-right "#[fg=yellow]#{?pane_synchronized,⚡SYNC ,}#[fg=cyan]#H #[fg=white]%H:%M"
setw -g window-status-current-style "bold,fg=green"

# ── Optional: session persistence across reboots ─────────────────────────────
# Uncomment after installing TPM (github.com/tmux-plugins/tpm) to auto-save and
# restore sessions — useful if you keep long-lived fleet-monitor layouts.
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore 'on'
# run '~/.tmux/plugins/tpm/tpm'
